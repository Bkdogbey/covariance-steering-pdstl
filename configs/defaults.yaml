# Shared optimizer defaults — scenarios override as needed

device: "auto"        # "auto" resolves to cuda if available, else cpu
save_dir: "data/results"  # output directory for plots and animations
animate: false        # produce GIF animation after run_comparison (override per-scenario)

optimizer:
  lr_v: 0.05
  lr_k: 0.005
  max_iters: 500
  converge_patience: 20

weights:
  w_phi: 1.0             # (1) pdSTL satisfaction: -log(p_sat)
  w_trace_terminal: 0.1  # (2) terminal covariance trace: tr(Σ_T[:2,:2])
  w_dist: 0.05           # (3) terminal goal distance
  w_du: 0.0005           # (4) control smoothness
  w_K: 0.0005            # (5) feedback gain regularization
  w_repulsion: 0.5       # (6) obstacle repulsion: ReLU(margin - dist)^2
  obs_margin: 0.5        # safety buffer around obstacles (metres)

alpha: 0.95              # satisfaction threshold for early stop

mpc:
  horizon: 10    # look-ahead window H (steps); must be <= total horizon T
  iters: 100     # optimizer iterations per MPC step
  n_starts: 1    # random restarts per step (1 = warm-start only, >1 adds random inits)
