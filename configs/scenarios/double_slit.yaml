# 
#
# Vertical wall at x ∈ [0.0, 1.5] with two traversable gaps:
#
#   Upper block : y ∈ [2.0,  4.0]
#   Upper gap   : y ∈ [1.5,  2.0]  ← width 0.5 (narrow)
#   Middle block: y ∈ [-1.0, 1.5]  ← vehicle starts aligned here (y=0)
#   Lower gap   : y ∈ [-2.0, -1.0] ← width 1.0 (wider)
#   Lower block : y ∈ [-4.0, -2.0]
#
# Expected behaviour:
#   Open-loop:   covariance grows → uses wider lower gap
#   Cov-steering: K shrinks σ_y → fits through narrower upper gap
#s
# NOTE: 'run_comparison' always runs both open-loop and closed-loop.
# Use the 'open_loop:' and 'closed_loop:' sections below to tune each
# independently. 'planner.steering' is only used by 'run_scenario'.

label: "Double Slit"
dynamics: configs/dynamics/double_integrator.yaml

horizon: 25
animate: true

initial_state:
  mean: [-3.0, 0.0, 1.0, 0.0]       # px, py, vx, vy — starts inside middle block y-range
  cov_diag: [0.0, 0.0, 0.00, 0.00]

goal:
  x_range: [4.5, 5.5]
  y_range: [0.5, 1.5]

bounds:
  x_range: [-3.5, 6.5]
  y_range: [-4.0, 4.0]

obstacles:
  - type: rectangle
    x_range: [0.0, 1.5]
    y_range: [2.0, 4.0]      # upper block
  - type: rectangle
    x_range: [0.0, 1.5]
    y_range: [-1.0, 1.5]     # middle block
  - type: rectangle
    x_range: [0.0, 1.5]
    y_range: [-4.0, -2.0]    # lower block

planner:
  type: single_shot
  steering: closed_loop

#mpc:
  #horizon: 15    # look-ahead window; must see past the wall (~10 steps away) to plan gaps
  #iters: 150     # optimizer iterations per MPC step
  #n_starts: 3    # random restarts per step — helps escape "stuck-in-obstacle" local minima

# ── Shared base optimizer ────────────────────────────────────────────
optimizer:
  max_iters: 1000
  lr_v: 0.05
  lr_k: 0.05

weights:
  w_phi: 10.0
  w_trace_terminal: 0.02
  w_dist: 0.1
  w_K: 0.005
  w_du: 0.5
  w_repulsion: 2.0
  obs_margin: 0.1

# ── Open-loop overrides ──────────────────────────────────────────────

open_loop:
  weights:
    w_repulsion: 2.0

# ── Closed-loop overrides ───────────────────────────────────────────

closed_loop:
  weights:
    w_repulsion: 2.0
