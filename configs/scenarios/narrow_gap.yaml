label: "Narrow Gap"
dynamics: configs/dynamics/double_integrator.yaml

horizon: 40      # Give the robot enough total steps to traverse the map
animate: true

initial_state:
  mean: [-1.0, 0.0, 1.0, 0.0]
  cov_diag: [0.001, 0.001, 0.001, 0.001]   # σ_y=0.5 so obstacle CDF gradients are non-zero

goal:
  x_range: [9.0, 10.0]
  y_range: [0.0, 1.0]   

bounds:
  x_range: [-1.0, 11.0]
  y_range: [-4.0, 4.0]

obstacles:
  - type: rectangle
    x_range: [4.5, 5.5]
    y_range: [-1.5, 4.0]
  - type: rectangle
    x_range: [1.5, 2.5]
    y_range: [-4.0, -2.0]

  - type: rectangle
    x_range: [1.5, 2.5]
    y_range: [-1.0, 1.0]
  - type: rectangle
    x_range: [7.0, 8.0]
    y_range: [-4.0, -1.0]
  - type: rectangle
    x_range: [1.5, 2.5]
    y_range: [2.5, 4.0]

planner:
  type: receding_horizon
  steering: closed_loop

mpc:
  horizon: 40      # 10 × 0.2 s = 2 s lookahead — sufficient to see each successive wall
  iters: 200       # optimizer iterations per MPC step
  n_starts: 2      # warm-start + one random restart to escape local minima

optimizer:
  max_iters: 200
  lr_v: 0.05
  lr_k: 0.05

weights:
  w_phi: 20.0
  w_repulsion: 2.0
  obs_margin: 0.5
  w_trace_terminal: 0.1
  w_dist: 0.1
  w_du: 0.1
  w_K: 0.01
