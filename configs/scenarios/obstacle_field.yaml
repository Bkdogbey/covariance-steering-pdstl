label: "Obstacle Field"
dynamics: configs/dynamics/single_integrator.yaml

horizon: 50

initial_state:
  mean: [0.0, 5.0]
  cov_diag: [0.01, 0.01]

goal:
  x_range: [10.0, 12.0]
  y_range: [2.0, 4.0]

bounds:
  x_range: [-1.0, 13.0]
  y_range: [-1.0, 11.0]

visit_regions:
  - x_range: [5.0, 7.0]
    y_range: [7.0, 9.0]

obstacles:
  - type: rectangle
    x_range: [3.0, 5.0]
    y_range: [3.5, 6.5]
  - type: rectangle
    x_range: [7.0, 9.0]
    y_range: [1.0, 3.0]
  - type: circle
    center: [6.0, 4.0]
    radius: 0.8

planner:
  type: single_shot
  steering: closed_loop
