label: "Lane Change"
dynamics: configs/dynamics/double_integrator.yaml

horizon: 40
sim_steps: 100

initial_state:
  mean: [0.0, 1.0, 3.0, 0.0]     # px, py, vx, vy
  cov_diag: [0.01, 0.01, 0.001, 0.001]

goal:
  x_range: [-1000, 1000]           # any x
  y_range: [3.0, 5.0]              # target lane

road:
  y_min: -1.0
  y_max: 7.0
  lane_divider: 3.0

obstacle:
  type: moving_rectangle
  x0: 3.0
  y: 4.0
  speed: 0.3
  width: 3.0
  height: 1.5

planner:
  type: mpc
  steering: closed_loop

optimizer:
  max_iters: 150
  lr_v: 0.04
  lr_k: 0.003

success:
  y_min: 3.0
  y_max: 5.0
  consecutive_steps: 15
