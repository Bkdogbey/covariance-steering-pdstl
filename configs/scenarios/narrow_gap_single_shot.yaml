label: "Narrow Gap"
dynamics: configs/dynamics/double_integrator.yaml

horizon: 80
animate: true

initial_state:
  mean: [-1.0, 0.0, 1.0, 0.0]
  cov_diag: [0.001, 0.001, 0.001, 0.001]

goal:
  x_range: [9.0, 10.0]
  y_range: [0.0, 1.0]

bounds:
  x_range: [-1.0, 11.0]
  y_range: [-4.0, 4.0]

obstacles:
  - type: rectangle
    x_range: [4.5, 5.5]
    y_range: [-1.5, 4.0]
  - type: rectangle
    x_range: [1.5, 2.5]
    y_range: [-4.0, -2.0]
  - type: rectangle
    x_range: [1.5, 2.5]
    y_range: [-1.0, 1.0]
  - type: rectangle
    x_range: [7.0, 8.0]
    y_range: [-4.0, -1.0]
  - type: rectangle
    x_range: [1.5, 2.5]
    y_range: [2.5, 4.0]

# Single-shot: one optimisation pass over the full horizon.
# No mpc: section needed — that is only read by run_mpc_scenario.
planner:
  type: single_shot   # informational only; run_comparison ignores this

optimizer:
  max_iters: 500      # more iterations — no replanning to fall back on
  lr_v: 0.05
  lr_k: 0.005

weights:
  w_phi: 20.0
  w_repulsion: 2.0
  obs_margin: 0.5
  w_trace_terminal: 0.5
  w_dist: 0.1
  w_du: 0.1
  w_K: 0.02           # higher than default: T=80 means K has 640 params

# Per-mode overrides applied by run_comparison via _mode_cfg.
open_loop:
  optimizer:
    lr_k: 0.0         # K is never updated for open-loop

closed_loop:
  weights:
    w_K: 0.02
